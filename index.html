<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Doce Encanto</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>🍰 Doce Encanto</h1>
    <p>Os melhores doces da sua cidade</p>
  </header>

  <section class="produtos">
    <div class="card">
      <h2>Brigadeiro</h2>
      <p>Delicioso brigadeiro gourmet</p>
      <span>R$ 5,00</span>
      <button onclick="comprar('Brigadeiro')">Comprar</button>
    </div>

    <div class="card">
      <h2>Bolo de Chocolate</h2>
      <p>Fofinho e com cobertura cremosa</p>
      <span>R$ 25,00</span>
      <button onclick="comprar('Bolo de Chocolate')">Comprar</button>
    </div>

    <div class="card">
      <h2>Cupcake</h2>
      <p>Colorido e irresistível</p>
      <span>R$ 8,00</span>
      <button onclick="comprar('Cupcake')">Comprar</button>
    </div>
  </section>

  <footer>
    <p>📲 Peça pelo WhatsApp</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
